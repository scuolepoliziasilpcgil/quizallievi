<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corso Allievi Agenti — Partecipa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --blu-deep:#234C72;
    --blu:#3A6CA0;
    --rosso:#C8102E;
    --giallo:#FFE699;
    --verde:#4FA66B;
    --crema:#F7F3E8;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100vh;
    height:100dvh;
  }
  body{
    font-family:'Inter',sans-serif;
    background:var(--blu-deep);
    color:var(--crema);
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .top-logo{
    display:block;
    width:min(32vw,120px);
    height:min(32vw,120px);
    margin:.4rem 0 0 1.2rem;
    border-radius:14px;
    object-fit:cover;
    flex:0 0 auto;
  }
  header{
    padding:.6rem 1.2rem .3rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.72rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    opacity:.7;
    text-align:center;
    flex:0 0 auto;
  }
  main{
    flex:1 1 0;
    min-height:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:.8rem 1.2rem;
    overflow-y:auto;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:.5rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.75rem;
    font-weight:500;
    letter-spacing:.18em;
    text-transform:uppercase;
    padding:.4rem 1rem;
    border-radius:999px;
    border:1px solid currentColor;
    opacity:.85;
    margin-bottom:1.4rem;
  }
  .badge.wordcloud{color:#9FD8FF;}
  .badge.sondaggio{color:#FFD27A;}
  .badge.quiz{color:#FF9AA8;}
  .question{
    font-weight:900;
    font-size:clamp(1.3rem,6vw,2rem);
    line-height:1.25;
    max-width:24ch;
    margin:0 0 1.6rem;
  }
  .question .hl{color:var(--giallo);}
  .options{
    display:flex;
    flex-direction:column;
    gap:.8rem;
    width:100%;
    max-width:420px;
  }
  .options.cloud-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:.45rem;
    width:100%;
    max-width:480px;
  }
  .options.cloud-grid .option-btn{
    font-size:.78rem;
    padding:.5rem .4rem;
    border-radius:10px;
    text-align:center;
    flex:unset;
  }
  .option-btn.selected{
    background:var(--giallo);
    border-color:var(--giallo);
    color:var(--blu-deep);
  }
  .option-btn.disabled{
    opacity:.4;
    pointer-events:none;
  }
  .cloud-hint{
    font-size:.78rem;
    opacity:.6;
    margin-bottom:.4rem;
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:.06em;
  }
  .cloud-send{
    margin-top:.8rem;
    padding:.75rem 2rem;
    background:var(--rosso);
    color:#fff;
    border:none;
    border-radius:12px;
    font-family:'Inter',sans-serif;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    opacity:.5;
    transition:opacity .15s;
  }
  .cloud-send.ready{opacity:1;}
  .option-btn{
    font-family:'Inter',sans-serif;
    font-size:1.05rem;
    font-weight:700;
    color:var(--crema);
    background:rgba(247,243,232,.08);
    border:1px solid rgba(247,243,232,.22);
    border-radius:14px;
    padding:1rem 1.2rem;
    text-align:left;
    cursor:pointer;
    transition:background .15s, border-color .15s;
  }
  .option-btn:active, .option-btn.selected{
    background:var(--verde);
    border-color:var(--verde);
    color:var(--blu-deep);
  }
  .text-input-row{
    display:flex;
    gap:.6rem;
    width:100%;
    max-width:420px;
  }
  .text-input{
    flex:1;
    font-family:'Inter',sans-serif;
    font-size:1.05rem;
    padding:.9rem 1rem;
    border-radius:14px;
    border:1px solid rgba(247,243,232,.3);
    background:rgba(247,243,232,.08);
    color:var(--crema);
  }
  .text-input::placeholder{color:rgba(247,243,232,.5);}
  .send-btn{
    font-family:'IBM Plex Mono',monospace;
    font-weight:500;
    letter-spacing:.08em;
    text-transform:uppercase;
    background:var(--verde);
    color:var(--blu-deep);
    border:none;
    border-radius:14px;
    padding:0 1.3rem;
    cursor:pointer;
  }
  .send-btn:disabled{opacity:.4;}
  .confirm{
    font-size:1.1rem;
    font-weight:700;
    color:var(--verde);
    margin-top:1rem;
  }
  .standby-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(2.2rem,9vw,3.5rem);
    margin:0 0 .6rem;
    animation:standbyIn .5s ease both;
  }
  .standby-sub{
    opacity:.75;
    max-width:30ch;
    font-size:1.05rem;
    animation:standbyIn .5s ease .1s both;
  }
  @keyframes standbyIn{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }
  .standby-dots{
    display:flex;
    gap:.5rem;
    justify-content:center;
    margin-top:1.6rem;
  }
  .standby-dots span{
    width:.7rem; height:.7rem;
    border-radius:50%;
    background:var(--giallo);
    opacity:.4;
    animation:dotPulse 1.4s ease-in-out infinite;
  }
  .standby-dots span:nth-child(2){animation-delay:.2s;}
  .standby-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dotPulse{
    0%,100%{opacity:.3; transform:scale(.85);}
    50%{opacity:1; transform:scale(1.15);}
  }
  .pausa-screen{background:var(--giallo); color:var(--blu-deep); width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .stats-bar{
    display:flex;
    justify-content:center;
    gap:1.4rem;
    padding:.45rem 1rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.72rem;
    opacity:.7;
    background:rgba(255,255,255,.05);
    border-top:1px solid rgba(247,243,232,.08);
    flex:0 0 auto;
  }
  .stat-item{ display:flex; align-items:center; gap:.35rem; }
  .stat-dot{ width:.55rem; height:.55rem; border-radius:50%; flex:0 0 auto; }
  .stat-dot.green{ background:#4FA66B; }
  .stat-dot.yellow{ background:var(--giallo); }
  .countdown-bar{
    display:block;
    height:5px;
    width:100%;
    background:var(--giallo);
    transform-origin:left center;
    flex:0 0 auto;
    opacity:.9;
  }
  .countdown-bar.running{
    animation:countdownShrink linear forwards;
  }
  @keyframes countdownShrink{
    from{transform:scaleX(1);}
    to{transform:scaleX(0);}
  }
  .contact-cta{
    display:block;
    margin-top:2rem;
    padding:1rem 1.4rem;
    background:var(--rosso);
    color:#fff;
    border-radius:14px;
    font-weight:700;
    font-size:.95rem;
    line-height:1.45;
    text-decoration:none;
    max-width:28ch;
    text-align:center;
    animation:standbyIn .5s ease .2s both;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
  }
  .contact-cta:active{opacity:.85;}
  .config-warning{
    max-width:34ch;
    font-size:.95rem;
    line-height:1.5;
    opacity:.8;
  }
</style>
</head>
<body>
<header id="pageHeader">SILP CGIL · Corso Allievi Agenti</header>
<img class="top-logo" src="logo.jpg" alt="">
<main id="main">
  <div class="standby-title">Connessione…</div>
</main>
<div class="countdown-bar" id="countdownBar" style="display:none"></div>
<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat-item"><span class="stat-dot green"></span><span id="statConnessi">—</span> connessi</div>
  <div class="stat-item"><span class="stat-dot yellow"></span><span id="statRisposte">—</span> risposte</div>
</div>


<script src="slides_data.js"></script>
<script src="config.js"></script>
<script>
const main = document.getElementById('main');
const statsBar = document.getElementById('statsBar');
const statConnessi = document.getElementById('statConnessi');
const statRisposte = document.getElementById('statRisposte');
const countdownBar = document.getElementById('countdownBar');
let lastSessionId = null;
let lastSlide = null;
let answeredKey = null;
let countdownSeconds = 15;

// Identificatore univoco per questo browser/allievo
const CLIENT_ID = 'C' + Math.random().toString(36).slice(2) + Date.now().toString(36);

function startCountdown(){
  if(!countdownBar) return;
  if(countdownSeconds <= 0){ countdownBar.style.display = 'none'; return; }
  countdownBar.style.display = 'block';
  countdownBar.classList.remove('running');
  countdownBar.style.animationDuration = countdownSeconds + 's';
  void countdownBar.offsetWidth; // forza reflow per ripartire
  countdownBar.classList.add('running');
}
function hideCountdown(){
  if(countdownBar){ countdownBar.classList.remove('running'); countdownBar.style.display = 'none'; }
}

function storageKey(sessionId, slide){
  return 'risposta_' + sessionId + '_' + slide;
}

function renderStandby(title, sub, pausaStyle){
  if(pausaStyle){
    main.parentElement.style.background = 'var(--giallo)';
    main.parentElement.style.color = 'var(--blu-deep)';
  } else {
    main.parentElement.style.background = '';
    main.parentElement.style.color = '';
  }
  main.innerHTML = `
    <div class="standby-title">${title}</div>
    <div class="standby-sub">${sub}</div>
    <div class="standby-dots"><span></span><span></span><span></span></div>
  `;
}

function renderSlide(sessionId, slideIndex){
  main.parentElement.style.background = '';
  main.parentElement.style.color = '';
  const s = slides[slideIndex];

  if(!s || s.type === 'title'){
    renderStandby('Si comincia!', 'Tieni il telefono a portata di mano: le domande arriveranno qui via via che il relatore avanza con le slide.');
    return;
  }
  if(s.type === 'closing'){
    main.parentElement.style.background = '';
    main.parentElement.style.color = '';
    hideCountdown();
    main.innerHTML = `
      <div class="standby-title">Grazie!</div>
      <div class="standby-sub">SILP CGIL è il vostro riferimento da oggi in poi.</div>
      <a class="contact-cta" href="https://scuolepoliziasilpcgil.github.io/contatti/index.html" target="_blank">
        Clicca qui per essere ricontattato in vista delle assegnazioni e su dubbi o informazioni
      </a>
    `;
    return;
  }
  if(s.type === 'narrazione'){
    main.parentElement.style.background = '';
    main.parentElement.style.color = '';
    hideCountdown();
    main.innerHTML = `
      <div class="standby-title" style="font-size:clamp(1.3rem,6vw,2rem);">${s.titolo}</div>
      <div class="standby-sub">${s.testo ? s.testo.substring(0,90) + (s.testo.length > 90 ? '…' : '') : ''}</div>
      <a class="contact-cta" href="https://scuolepoliziasilpcgil.github.io/contatti/index.html" target="_blank" style="margin-top:1.8rem;">
        Lascia i tuoi contatti
      </a>
    `;
    return;
  }
  if(s.type === 'pausa'){
    renderStandby('Pausa', 'Approfittane per fare due chiacchiere con i delegati presenti in sala. Tra poco si ricomincia.', true);
    return;
  }

  const badge = badgeLabels[s.type];
  const already = localStorage.getItem(storageKey(sessionId, slideIndex));

  let html = `<div class="badge ${badge.cls}">${badge.text}</div>`;
  html += `<div class="question">${s.q}</div>`;

  const isCloudWithOptions = s.type === 'wordcloud' && s.options && s.options.length > 0;
  const hasOptions = s.options && s.options.length > 0;
  const maxSel = s.maxSelect || 1;

  if(already !== null){
    html += `<div class="confirm">Risposta inviata ✅</div>`;
    main.innerHTML = html;
    return;
  }

  if(isCloudWithOptions){
    const hint = maxSel > 1 ? `Scegli fino a ${maxSel} parole` : 'Scegli una parola';
    html += `<div class="cloud-hint">${hint}</div>`;
    html += `<div class="options cloud-grid" id="opts">`;
    s.options.forEach(opt => {
      html += `<button class="option-btn" data-value="${opt.replace(/"/g,'&quot;')}">${opt}</button>`;
    });
    html += `</div>`;
    html += `<button class="cloud-send" id="cloudSend" disabled>Invia</button>`;
    main.innerHTML = html;

    const selected = [];
    const sendBtn = document.getElementById('cloudSend');
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.value;
        if(btn.classList.contains('selected')){
          btn.classList.remove('selected');
          selected.splice(selected.indexOf(val), 1);
        } else {
          if(selected.length >= maxSel) return;
          btn.classList.add('selected');
          selected.push(val);
        }
        if(selected.length >= maxSel){
          document.querySelectorAll('.option-btn:not(.selected)').forEach(b => b.classList.add('disabled'));
        } else {
          document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('disabled'));
        }
        if(selected.length > 0){
          sendBtn.disabled = false;
          sendBtn.classList.add('ready');
        } else {
          sendBtn.disabled = true;
          sendBtn.classList.remove('ready');
        }
      });
    });
    sendBtn.addEventListener('click', () => {
      if(selected.length === 0) return;
      submitAnswer(sessionId, slideIndex, selected.join(','));
    });

  } else if(hasOptions){
    html += `<div class="options" id="opts">`;
    s.options.forEach(opt => {
      html += `<button class="option-btn" data-value="${opt.replace(/"/g,'&quot;')}">${opt}</button>`;
    });
    html += `</div>`;
    main.innerHTML = html;
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        submitAnswer(sessionId, slideIndex, btn.dataset.value);
      });
    });
  } else {
    html += `<div class="text-input-row">
      <input class="text-input" id="textAnswer" type="text" maxlength="40" placeholder="Scrivi qui...">
      <button class="send-btn" id="sendBtn">Invia</button>
    </div>`;
    main.innerHTML = html;
    const input = document.getElementById('textAnswer');
    const btn = document.getElementById('sendBtn');
    const send = () => {
      const value = input.value.trim();
      if(!value) return;
      submitAnswer(sessionId, slideIndex, value);
    };
    btn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if(e.key === 'Enter') send(); });
  }
}

function submitAnswer(sessionId, slideIndex, value){
  localStorage.setItem(storageKey(sessionId, slideIndex), value);
  hideCountdown();
  main.innerHTML = `<div class="confirm">Risposta inviata ✅</div>`;
  // Per le wordcloud con opzioni multiple, inviamo ogni parola come voto separato
  const values = value.split(',').map(v => v.trim()).filter(Boolean);
  values.forEach(v => {
    fetch(GAS_URL, {
      method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'vote', sessionId: sessionId, slide: slideIndex, value: v, clientId: CLIENT_ID })
    }).catch(()=>{});
  });
}

async function sendPing(){
  if(!lastSessionId) return;
  try {
    await fetch(GAS_URL, {
      method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'ping', clientId: CLIENT_ID, sessionId: lastSessionId, slide: lastSlide })
    });
  } catch(e){}
}

async function updateStats(){
  if(!lastSessionId) return;
  try {
    const res = await fetch(GAS_URL + '?action=stats&session=' + encodeURIComponent(lastSessionId) + '&slide=' + encodeURIComponent(lastSlide));
    const data = await res.json();
    if(data.connessi !== undefined){
      statsBar.style.display = 'flex';
      statConnessi.textContent = data.connessi;
      statRisposte.textContent = data.risposte;
    }
  } catch(e){}
}

let lastCorso = null;
const pageHeader = document.getElementById('pageHeader');

async function poll(){
  if(GAS_URL.indexOf('INSERIRE') === 0){
    main.innerHTML = `<div class="config-warning">Il sistema non è ancora configurato. Manca l'indirizzo del backend in config.js.</div>`;
    return;
  }
  try{
    const res = await fetch(GAS_URL + '?action=state');
    const data = await res.json();
    if(data.countdown !== undefined && data.countdown !== null){
      countdownSeconds = Number(data.countdown);
    }
    if(data.corso && data.corso !== lastCorso){
      lastCorso = data.corso;
      pageHeader.textContent = 'SILP CGIL · ' + lastCorso + '° Corso Allievi Agenti';
      document.title = lastCorso + '° Corso Allievi Agenti — Partecipa';
    }
    if(data.sessionId !== lastSessionId || data.slide !== lastSlide){
      lastSessionId = data.sessionId;
      lastSlide = data.slide;
      renderSlide(data.sessionId, data.slide);
      sendPing();      // ping immediato sul nuovo stato
      updateStats();   // aggiorna subito i contatori
      // countdown solo sulle slide domanda (quiz, sondaggio, wordcloud)
      const sl = slides[data.slide];
      const already = sl ? localStorage.getItem(storageKey(data.sessionId, data.slide)) : null;
      if(sl && (sl.type === 'quiz' || sl.type === 'sondaggio' || sl.type === 'wordcloud') && already === null){
        startCountdown();
      } else {
        hideCountdown();
      }
    }
  } catch(err){
    // silenzioso, riprova al prossimo giro
  }
}

poll();
setInterval(poll, 5000);
setInterval(sendPing, 6000);    // ping ogni 6 secondi
setInterval(updateStats, 2000); // aggiorna contatori ogni 2 secondi
sendPing();                     // ping immediato all'apertura
</script>
</body>
</html>
